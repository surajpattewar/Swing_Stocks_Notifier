name: Daily Swing Trade Screener

on:
  schedule:
    # 10:30 UTC = 04:00 PM IST, Mon-Fri (Update to your preferred 5 PM IST time)
    - cron: "30 10 * * 1-5"

  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install uv and setup Python automatically based on pyproject.toml
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true # Speeds up subsequent runs drastically

      - name: Install dependencies
        # uv sync reads uv.lock and pyproject.toml to install everything perfectly
        run: uv sync --frozen

      - name: Run screener
        env:
          SEND_WHATSAPP: ${{ vars.SEND_WHATSAPP }}
          MIN_SCORE: ${{ vars.MIN_SCORE }}
          MAX_STOCKS_TO_SCAN: ${{ vars.MAX_STOCKS_TO_SCAN }}
          TOP_N_ALERTS: ${{ vars.TOP_N_ALERTS }}
          SEND_TELEGRAM: ${{ vars.SEND_TELEGRAM }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}

        # uv run executes the script within the managed virtual environment
        run: uv run main.py